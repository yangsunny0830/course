<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Browser</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            background: #d0d0d0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
        }

        .browser {
            display: flex;
            flex-direction: column;
            border: 1px solid #c8c8c8;
            width: 500px;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .browser-header {
            display: flex;
            background: #f6f6f6;
            border-bottom: 1px solid #eaeaea;
            height: 30px;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px 0 15px;
        }

        .header-title { color: #2f2f2f; font-size: 13px; }

        .info-btn {
            height: 22px;
            padding: 0 18px;
            border-radius: 8px;
            background: #ffffff;
            border: 1px solid #2f2f2f;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            color: #2f2f2f;
            cursor: pointer;
        }

        .info-btn:hover { background: #f0f0f0; }

        .preview-panel {
            display: flex;
            flex-direction: column;
            padding: 20px 26px 20px 20px;
            gap: 8px;
        }

        .preview-image {
            width: 100%;
            height: 240px;
            overflow: hidden;
        }

        /* ↓↓↓ 圖片網址放在這個 img 的 src ↓↓↓ */
        .preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .preview-caption { color: #707070; font-size: 13px; }

        .info-panel {
            display: none;
            overflow-y: auto;
            max-height: 120px;
            min-height: 10px;
            border: 1px solid #ffffff;
        }

        .info-panel.open { display: block; }

        .info-row {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: #ffffff;
            border-bottom: 1px solid #ffffff;
            font-size: 13px;
            color: #2f2f2f;
            min-height: 22px;
        }

        .info-row:last-child { border-bottom: none; }
        .info-key { flex-shrink: 0; white-space: nowrap; min-width: 70px; }
        .info-val { word-break: break-all; }
    </style>
</head>
<body>

<div class="browser">

    <div class="browser-header">
        <span class="header-title">預覽</span>
        <button class="info-btn" id="infoBtn" onclick="toggleInfo()">查看資訊</button>
    </div>

    <div class="preview-panel">

        <div class="preview-image">
            <img id="previewImg" src="https://shoplineimg.com/5efb01528e33e5003d6b9f58/685bbed35ba77000102cf133/800x.jpg?" alt="preview">
        </div>

        <span class="preview-caption">預覽圖片縮圖</span>

        <div class="info-panel" id="infoPanel">
            <div class="info-row">
                <span class="info-key">拍攝日期：</span>
                <span class="info-val">2026/04/27</span>
            </div>
            <div class="info-row">
                <span class="info-key">類型：</span>
                <span class="info-val">JPEG</span>
            </div>
            <div class="info-row">
                <span class="info-key">大小：</span>
                <span class="info-val">466.97KB</span>
            </div>
            <div class="info-row">
                <span class="info-key">路徑：</span>
                <span class="info-val">https://www.bu.edu/files/2024/08/Hey-BU-Blog-Headers.jpg</span>
            </div>
        </div>

    </div>
</div>

<script>
    function toggleInfo() {
        const panel = document.getElementById('infoPanel');
        const btn = document.getElementById('infoBtn');
        const isOpen = panel.classList.toggle('open');
        btn.textContent = isOpen ? '收起資訊' : '查看資訊';
    }
</script>

</body>
</html>
