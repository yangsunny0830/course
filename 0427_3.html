<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Layout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #29abe2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }

    /* ── GREEN HERO ── */
    .hero {
      background: #8dc63f;
      border-radius: 16px;
      height: 280px;
      margin-bottom: 24px;
    }

    /* ── TEAL ROWS (mobile default) ── */
    .teal-group {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 24px;
    }

    .teal-block {
      background: #29abe2;
      border-radius: 14px;
      height: 100px;
    }

    /* ── GREY GRID ── */
    .grey-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .grey-block {
      background: #d4d4d4;
      border-radius: 14px;
      height: 130px;
    }

    @media (min-width: 480px) {
      .card { max-width: 1200px; }

      .hero { height: 320px; }

      .teal-group {
        flex-direction: row;
      }

      .teal-block { flex: 1; height: 220px; }

      .grey-group {
        grid-template-columns: repeat(4, 1fr);
      }

      .grey-block { height: 160px; }
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Green hero banner -->
    <div class="hero"></div>

    <!-- Teal blocks: stacked on mobile, side-by-side on wide -->
    <div class="teal-group">
      <div class="teal-block"></div>
      <div class="teal-block"></div>
      <div class="teal-block"></div>
    </div>

    <!-- Grey grid: 2 cols on mobile, 4 cols on wide -->
    <div class="grey-group">
      <div class="grey-block"></div>
      <div class="grey-block"></div>
      <div class="grey-block"></div>
      <div class="grey-block"></div>
    </div>

  </div>
</body>
</html>
