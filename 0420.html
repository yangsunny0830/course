<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }

        th {
            background-color: #555;
            color: white;
            padding: 8px 16px;
            border: 2px solid #333;
        }

        tr:nth-child(even) td {
            background-color: rgb(255, 238, 0);
        }

        td {
            padding: 8px 16px;
            border: 2px solid #333;
        }

        .fixed-box {
            position: fixed;
            top: 20px;
            right: 20px;
            border: 3px solid rgba(81, 148, 81, 0.74);
            padding: 10px;
            max-width: 98px;
            background-color: white;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
        </tr>
        <tr>
            <td>1</td>
            <td>1</td>
        </tr>
        <tr>
            <td>2</td>
            <td>2</td>
        </tr>
        <tr>
            <td>3</td>
            <td>3</td>
        </tr>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
